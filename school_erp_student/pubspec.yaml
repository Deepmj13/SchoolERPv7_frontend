name: school_erp_student
description: "Student Portal for School ERP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.3.0
  flutter_secure_storage: ^10.3.1
  connectivity_plus: ^7.1.1
  sentry_flutter: ^8.14.2
  logging: ^1.3.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../../icons/student.jpeg"
  web:
    generate: true
  macos:
    generate: true
  windows:
    generate: true
